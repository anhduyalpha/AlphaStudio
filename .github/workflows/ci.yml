# Core stabilize CI — typecheck, build, unit tests (no full tool bootstrap).
# Required check name: "CI / core-ubuntu" (do not enable branch protection until green once).
name: CI

on:
  push:
    branches: [main, stabilize/**]
  pull_request:
    branches: [main, stabilize/**]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-ubuntu:
    name: core-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit / integration tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test.log
        env:
          LOG_LEVEL: error
          CI: '1'

      - name: Maint + hygiene scripts
        run: |
          npm run test:maint
          npm run test:hygiene

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-core-ubuntu-logs
          path: |
            npm-test.log
          retention-days: 14
          if-no-files-found: ignore
