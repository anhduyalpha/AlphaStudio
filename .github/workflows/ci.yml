# Minimal stabilize CI — typecheck, build, unit tests (no full tool bootstrap).
name: CI

on:
  push:
    branches: [main, stabilize/**]
  pull_request:
    branches: [main, stabilize/**]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit / integration tests
        run: npm test
        env:
          LOG_LEVEL: error
